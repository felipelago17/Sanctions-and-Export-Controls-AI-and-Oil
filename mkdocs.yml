site_name: Sanctions & Export Controls — AI, Advanced Computing & Oil/Energy
site_description: >
  Curated resource on US export controls (EAR/BIS) and OFAC sanctions as applied
  to artificial intelligence, advanced computing, and the oil/energy sector.
site_author: Felipe Villasuso Lago
site_url: https://felipelago17.github.io/Sanctions-and-Export-Controls-AI-and-Oil-site/

repo_name: felipelago17/Sanctions-and-Export-Controls-AI-and-Oil-site
repo_url: https://github.com/felipelago17/Sanctions-and-Export-Controls-AI-and-Oil-site
edit_uri: ""

docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - toc.follow
    - content.action.edit
    - content.code.copy
    - content.tabs.link

plugins:
  - search

markdown_extensions:
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Regulations:
    - Primary Sources: regulations/primary-sources.md
    - AI & Advanced Technology: regulations/ai-advanced-tech-export-controls.md
    - EAR Interaction Risk Matrix (Physical & Logical): regulations/ear-interaction-risk-matrix.md
    - Extraterritorial Enforcement: regulations/extraterritorial-enforcement.md
    - Encryption & Open Source: regulations/encryption-open-source.md
    - OFAC UBO & 50% Rule: regulations/ofac-ubo-50-percent-rule.md
    - BIS Affiliates Rule: regulations/bis-affiliates-rule.md
    - Sanctions — Oil & Energy: regulations/sanctions-oil-energy.md
    - PRC Critical Minerals (Africa): regulations/prc-critical-minerals-africa.md
    - Chip Security Act (PBLV): regulations/chip-security-act.md
  - Designations Register:
    - Index: jurisdictions/index.md
    - UK (Russia 2026): jurisdictions/uk/2026/russia-shadow-fleet-june-2026.md
    - US (OFAC Spring 2026): jurisdictions/us/2026/ofac-spring-2026-wave.md
    - EU (May 2026): jurisdictions/eu/2026/may-2026-wave.md
    - UAE (2026): jurisdictions/uae/2026/local-designations-2026.md
    - Australia (Iran 2026): jurisdictions/australia/2026/iran-autonomous-sanctions-2026.md
  - Cases:
    - BIS Deemed-Export — Anthropic Fable 5 / Mythos 5 (Jun 2026): cases/2026-06-anthropic-fable-mythos-deemed-export.md
  - Tools:
    - ECCN Classifier: tools/eccn-classifier/index.html
  - Visuals & Tools: visuals.md
  - Sources & Literature: additional-sources.md
  - Compliance Clinics:
    - Overview: scenarios/index.md
    - "01 — UAE affiliate + deemed exports": scenarios/2026-uae-affiliate-deemed-export.md
  - News:
    - Daily Digest: news/digest.md

not_in_nav: |
  scenarios/scenario-template.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/felipelago17

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
