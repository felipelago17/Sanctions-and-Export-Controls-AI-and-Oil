name: Refresh ECCN/EAR Regulatory Data

on:
  schedule:
    - cron: '0 5 * * 1'   # 05:00 UTC Monday (before the BIS affiliates monitor at 06:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests lxml

      - name: Run refresh script
        run: python scripts/refresh_rules.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/tools/eccn-classifier/data/
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore(data): refresh ECCN/EAR snapshot $(date -u +%Y-%m-%d)"
          git push
